name: TraceGate Advisory

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  advisory:
    name: Warning-only PR advisory
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TraceGate
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Collect PR changed files
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > /tmp/tracegate_changed_files.txt
          test -s /tmp/tracegate_changed_files.txt || true

      - name: Generate advisory summary
        run: |
          python scripts/github_action_advisory.py \
            --config tracegate.yml \
            --changed-files /tmp/tracegate_changed_files.txt \
            --output "$GITHUB_STEP_SUMMARY"
