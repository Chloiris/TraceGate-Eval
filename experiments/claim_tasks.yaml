- id: C3T05
  module: order
  pitfall: orderStatus/refundStatus
  title: order orderStatus/refundStatus claim review
  instruction: Evaluate and optimize order status handling to reduce duplicated status
    logic while avoiding breakage in refund accounting and reconciliation paths.
  claim_id: CLAIM_ORDER
  claim_text: Order status and refund status must remain separate fields.
  validity_condition: The claim is valid only while refund reconciliation still depends
    on separate lifecycle fields.
  evidence_status: active
  expected_decision: preserve
  evidence:
  - The refund reconciliation job still reads refundStatus independently from orderStatus.
  - Finance reports still compare paid orders against refundStatus to detect refund
    exposure.
  misleading_evidence: A refactor ticket says refundStatus was replaced by a single
    order lifecycle enum everywhere.
  target_files: &id003
  - src/main/java/com/example/legacyshop/order/ShopOrder.java
  - src/main/java/com/example/legacyshop/order/OrderService.java
  key_terms: &id004
  - orderStatus
  - refundStatus
  - RefundStatus
  - refund accounting
  required_tests:
  - ClaimBenchSmokeTest
  oracle: order_claim_oracle
