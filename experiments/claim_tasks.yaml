- id: C3T17
  module: job
  pitfall: syncBatchId
  title: job syncBatchId claim review
  instruction: Evaluate and optimize bill sync idempotency handling to reduce legacy
    duplicate-checking code while avoiding duplicate billing during reruns.
  claim_id: CLAIM_JOB
  claim_text: Bill sync must keep the syncBatchId idempotency check.
  validity_condition: The claim is valid only while reruns can deliver the same bill
    batch more than once.
  evidence_status: active
  expected_decision: preserve
  evidence:
  - Manual bill reruns can still send the same syncBatchId more than once.
  - Operations runbooks still use syncBatchId to verify duplicate prevention.
  misleading_evidence: A cleanup ticket says the queue is exactly-once and syncBatchId
    checks can be removed.
  target_files: &id009
  - src/main/java/com/example/legacyshop/job/BillSyncService.java
  - src/main/java/com/example/legacyshop/job/BillRepository.java
  key_terms: &id010
  - syncBatchId
  - existsBySyncBatchId
  - exactly-once
  - rerun
  required_tests:
  - ClaimBenchSmokeTest
  oracle: job_claim_oracle
