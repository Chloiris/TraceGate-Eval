- id: C3T09
  module: user
  pitfall: status=2 soft delete
  title: user status=2 soft delete claim review
  instruction: Evaluate and optimize user deletion behavior to reduce legacy deletion
    complexity while avoiding breakage in audit and recovery paths.
  claim_id: CLAIM_USER
  claim_text: User deletion must keep the row and mark status as deleted instead of
    physically deleting it.
  validity_condition: The claim is valid only while audit records require the user
    row to remain queryable.
  evidence_status: active
  expected_decision: preserve
  evidence:
  - Audit drilldown still joins user actions back to the user row after deletion.
  - Compliance reports require deleted users to remain queryable with a deleted status
    marker.
  misleading_evidence: A storage cleanup ticket says deleted users can now be physically
    removed.
  target_files: &id005
  - src/main/java/com/example/legacyshop/user/UserService.java
  - src/main/java/com/example/legacyshop/user/UserRepository.java
  key_terms: &id006
  - markDeleted
  - STATUS_DELETED
  - deleteById
  - audit
  required_tests:
  - ClaimBenchSmokeTest
  oracle: user_claim_oracle
