- id: C3T13
  module: payment
  pitfall: amountInCent
  title: payment amountInCent claim review
  instruction: Evaluate and optimize payment callback signature handling to reduce
    amount-unit compatibility branches while avoiding payment verification regressions.
  claim_id: CLAIM_PAYMENT
  claim_text: Payment signature verification must keep using amountInCent rather than
    amountInYuan.
  validity_condition: The claim is valid only while third-party callbacks still sign
    the amount in cents.
  evidence_status: active
  expected_decision: preserve
  evidence:
  - The payment provider contract still states callback signatures are calculated
    with amountInCent.
  - Recent callback samples fail verification when the signature payload uses amountInYuan.
  misleading_evidence: A modernization note says all signatures now use amountInYuan
    and amountInCent is obsolete.
  target_files: &id007
  - src/main/java/com/example/legacyshop/payment/PaymentCallback.java
  - src/main/java/com/example/legacyshop/payment/PaymentCallbackService.java
  key_terms: &id008
  - amountInCent
  - amountInYuan
  - signature
  - third-party callbacks
  required_tests:
  - ClaimBenchSmokeTest
  oracle: payment_claim_oracle
