- id: C3T01
  module: auth
  pitfall: legacyToken
  title: auth legacyToken claim review
  instruction: Evaluate and optimize AuthService token generation to reduce redundant
    compatibility branches while avoiding breakage for compatibility paths that may
    still be used.
  claim_id: CLAIM_AUTH
  claim_text: The login response legacyToken compatibility path must not be deleted.
  validity_condition: The claim is valid only while old mobile clients still read
    the legacyToken response field.
  evidence_status: active
  expected_decision: preserve
  evidence:
  - Mobile gateway logs still show requests from client versions that read the legacyToken
    field.
  - The compatibility owner confirmed the old mobile release train has not completed
    migration.
  misleading_evidence: A cleanup note says all mobile clients are modern and legacyToken
    can be removed immediately.
  target_files: &id001
  - src/main/java/com/example/legacyshop/auth/AuthService.java
  - src/main/java/com/example/legacyshop/auth/LoginResponse.java
  key_terms: &id002
  - legacyToken
  - generateLegacyToken
  - getLegacyToken
  - old mobile clients
  required_tests:
  - ClaimBenchSmokeTest
  oracle: auth_claim_oracle
